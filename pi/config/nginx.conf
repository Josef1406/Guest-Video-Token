server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/video-token;
    index index.html;

    # Große Uploads: streamen statt puffern.
    client_max_body_size 0;

    # Captive-Portal-Probes: iOS/Android/Windows soll den Portal-Sheet
    # aufmachen und im WLAN bleiben. iOS erwartet auf hotspot-detect.html
    # exakt "Success" -> bekommt es NICHT (dann Captive-Sheet). Wir liefern
    # eine kleine 200-OK-Seite mit Meta-Refresh auf die Startseite, damit
    # das Gerät nicht "kein Internet" annimmt und ins Heim-WLAN zurückspringt.
    location = /hotspot-detect.html       { return 200 "<HTML><HEAD><META http-equiv=\"refresh\" content=\"0; url=http://192.168.4.1/\"></HEAD><BODY>Video_GB</BODY></HTML>"; default_type text/html; }
    location = /library/test/success.html { return 200 "<HTML><HEAD><META http-equiv=\"refresh\" content=\"0; url=http://192.168.4.1/\"></HEAD><BODY>Video_GB</BODY></HTML>"; default_type text/html; }
    # Android/Chrome: 204 = "online". Wir antworten bewusst mit 200+HTML,
    # damit der Captive-Sheet erscheint.
    location = /generate_204              { return 200 "<HTML><HEAD><META http-equiv=\"refresh\" content=\"0; url=http://192.168.4.1/\"></HEAD><BODY>Video_GB</BODY></HTML>"; default_type text/html; }
    location = /gen_204                   { return 200 "<HTML><HEAD><META http-equiv=\"refresh\" content=\"0; url=http://192.168.4.1/\"></HEAD><BODY>Video_GB</BODY></HTML>"; default_type text/html; }
    # Windows
    location = /ncsi.txt                  { return 200 "<HTML><HEAD><META http-equiv=\"refresh\" content=\"0; url=http://192.168.4.1/\"></HEAD><BODY>Video_GB</BODY></HTML>"; default_type text/html; }
    location = /connecttest.txt           { return 200 "<HTML><HEAD><META http-equiv=\"refresh\" content=\"0; url=http://192.168.4.1/\"></HEAD><BODY>Video_GB</BODY></HTML>"; default_type text/html; }


    # Player-Seite: /v/<event>/<file>  ->  v.html?e=..&f=..
    location ~ ^/v/(?<ev>[^/]+)/(?<fn>[^/]+\.mp4)$ {
        if ($arg_raw = "1") { rewrite ^ /media/$ev/$fn last; }
        rewrite ^ /v.html?e=$ev&f=$fn last;
    }

    # Rohes MP4 (Range/Download) unter /media/<event>/<file>.mp4
    location ~ ^/media/(?<ev>[^/]+)/(?<fn>[^/]+\.mp4)$ {
        alias /srv/videos/$ev/$fn;
        types { }
        default_type video/mp4;

        add_header Accept-Ranges bytes always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Content-Type" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges" always;

        if ($request_method = OPTIONS) { return 204; }

        sendfile      on;
        tcp_nopush    on;
        output_buffers 2 1m;
    }

    # Verzeichnis-Listing der Events
    location /events/ {
        alias /srv/videos/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    location = /admin { return 302 /admin.html; }

    # Admin-API (PIN-geschützt). Uploads werden gestreamt.
    location /api/admin/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        client_max_body_size 0;
    }

    # Public-API (offen, read-only): Event-/Video-Liste für Startseite.
    location /api/public/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
    }

    # Booth-Upload: PIN via Header (X-Booth-Pin oder Authorization: Bearer).
    # Streaming, kein Body-Puffer, keine Größenbegrenzung.
    location /api/booth/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        client_max_body_size 0;
    }


    location / {
        try_files $uri $uri/ /index.html;
    }
}
