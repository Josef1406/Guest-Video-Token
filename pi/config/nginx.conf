server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/video-token;
    index index.html;

    # Große Uploads: streamen statt puffern.
    client_max_body_size 0;

    # Captive-Portal-Probes: iOS/Android/Windows erkennen ein Portal, wenn
    # sie NICHT die erwartete Erfolgs-Antwort bekommen. Wir liefern statt
    # dessen unsere Captive-Seite mit "Verbindung annehmen"-Button.
    # Erst wenn der Nutzer den Button drückt, liefert /accept die exakt von
    # iOS erwartete "Success"-Antwort -> iOS markiert das Netz als
    # akzeptiert und bleibt verbunden, bis das WLAN manuell getrennt wird.
    location = /hotspot-detect.html       { try_files /captive.html =404; default_type text/html; }
    location = /library/test/success.html { try_files /captive.html =404; default_type text/html; }
    location = /generate_204              { try_files /captive.html =404; default_type text/html; }
    location = /gen_204                   { try_files /captive.html =404; default_type text/html; }
    location = /ncsi.txt                  { try_files /captive.html =404; default_type text/html; }
    location = /connecttest.txt           { try_files /captive.html =404; default_type text/html; }

    # Nutzer hat "Verbindung annehmen" bestätigt: iOS-kompatible Success-
    # Antwort ausliefern. Damit schließt das Captive-Sheet und das Gerät
    # bleibt dauerhaft im WLAN Video_GB, bis der Nutzer es selbst trennt.
    location = /accept {
        return 200 "<HTML><HEAD><TITLE>Success</TITLE></HEAD><BODY>Success</BODY></HTML>";
        default_type text/html;
    }



    # Player-Seite: /v/<event>/<file>  ->  v.html?e=..&f=..
    location ~ ^/v/(?<ev>[^/]+)/(?<fn>[^/]+\.mp4)$ {
        if ($arg_raw = "1") { rewrite ^ /media/$ev/$fn last; }
        rewrite ^ /v.html?e=$ev&f=$fn last;
    }

    # Rohes MP4 (Range/Download) unter /media/<event>/<file>.mp4
    location ~ ^/media/(?<ev>[^/]+)/(?<fn>[^/]+\.mp4)$ {
        alias /srv/videos/$ev/$fn;
        types { }
        default_type video/mp4;

        add_header Accept-Ranges bytes always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Content-Type" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges" always;

        if ($request_method = OPTIONS) { return 204; }

        sendfile      on;
        tcp_nopush    on;
        output_buffers 2 1m;
    }

    # Verzeichnis-Listing der Events
    location /events/ {
        alias /srv/videos/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    location = /admin { return 302 /admin.html; }

    # Admin-API (PIN-geschützt). Uploads werden gestreamt.
    location /api/admin/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        client_max_body_size 0;
    }

    # Public-API (offen, read-only): Event-/Video-Liste für Startseite.
    location /api/public/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
    }

    # Booth-Upload: PIN via Header (X-Booth-Pin oder Authorization: Bearer).
    # Streaming, kein Body-Puffer, keine Größenbegrenzung.
    location /api/booth/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        client_max_body_size 0;
    }

    # Direktupload-API (Booth / Video-Gästebuch, Auth via X-Upload-Secret).
    # Streaming, kein Body-Puffer, keine Größenbegrenzung.
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        client_max_body_size 0;
    }


    location / {
        try_files $uri $uri/ /index.html;
    }
}
