<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Video-Token · Admin</title>
<link rel="stylesheet" href="/assets/styles.css" />
<style>
  .card { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:16px; margin:12px 0; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; }
  .kpi  { font-size:2rem; font-weight:700; }
  .muted{ color:#8b949e; font-size:.9rem; }
  table { width:100%; border-collapse:collapse; }
  th,td { text-align:left; padding:6px 8px; border-bottom:1px solid #30363d; font-size:.95rem; vertical-align:middle; }
  .row  { display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap; }
  input[type=password], input[type=text]{ padding:10px; border-radius:8px; border:1px solid #30363d; background:#0d1117; color:#e6edf3; font-size:1rem; }
  button{ padding:8px 14px; border-radius:8px; border:0; background:#238636; color:#fff; font-weight:600; cursor:pointer; }
  button.secondary{ background:#30363d; }
  button.danger{ background:#da3633; }
  button:disabled{ opacity:.5; cursor:not-allowed; }
  .bar{ height:10px; background:#30363d; border-radius:6px; overflow:hidden; }
  .bar>span{ display:block; height:100%; background:linear-gradient(90deg,#2ea043,#f0883e,#f85149); }
  .event-block{ border:1px solid #30363d; border-radius:10px; padding:12px; margin-top:10px; }
  .event-block h4{ margin:0 0 8px; }
  progress{ width:100%; height:14px; }
</style>
</head>
<body>
<main class="container">
  <h1>🔧 Video-Token · Admin</h1>

  <section id="login" class="card" hidden>
    <h2>PIN eingeben</h2>
    <form id="loginForm" class="row">
      <input id="pin" type="password" inputmode="numeric" autocomplete="off" placeholder="PIN" />
      <button type="submit">Anmelden</button>
    </form>
    <p id="loginErr" class="muted" style="color:#f85149"></p>
  </section>

  <section id="dashboard" hidden>
    <div class="row">
      <div class="muted">Aktualisiert: <span id="ts">–</span></div>
      <button class="secondary" id="logout">Logout</button>
    </div>

    <div class="grid">
      <div class="card"><div class="muted">Video-Dateien</div><div class="kpi" id="videoCount">–</div></div>
      <div class="card"><div class="muted">Events</div><div class="kpi" id="eventCount">–</div></div>
      <div class="card"><div class="muted">Verbundene Geräte</div><div class="kpi" id="clientCount">–</div></div>
      <div class="card">
        <div class="muted">SD-Speicher (Videos)</div>
        <div class="kpi" id="diskFree">–</div>
        <div class="bar"><span id="diskBar" style="width:0%"></span></div>
        <div class="muted" id="diskDetail"></div>
      </div>
      <div class="card">
        <div class="muted">Schreibschutz (Dateisystem)</div>
        <div class="kpi"><span id="lockIcon">–</span> <span id="lockState">–</span></div>
        <div class="muted" id="lockDetail"></div>
        <div class="row" style="margin-top:10px; gap:8px;">
          <button id="btnLock">🔒 Schützen</button>
          <button id="btnUnlock" class="secondary">🔓 Freigeben</button>
        </div>
        <p id="lockMsg" class="muted" style="margin-top:6px;"></p>
      </div>
    </div>

    <div class="card">
      <h3>Neues Event anlegen</h3>
      <form id="newEventForm" class="row">
        <input id="newEventName" type="text" placeholder="event-slug (z.B. hochzeit-mueller)" style="flex:1; min-width:220px;" />
        <button type="submit">Anlegen</button>
      </form>
      <p id="newEventMsg" class="muted"></p>
    </div>

    <div class="card">
      <h3>Videos hochladen</h3>
      <div class="row">
        <select id="uploadEvent" style="padding:10px; border-radius:8px; background:#0d1117; color:#e6edf3; border:1px solid #30363d; min-width:220px;"></select>
        <input id="uploadFiles" type="file" accept="video/mp4,.mp4" multiple />
        <button id="btnUpload">Hochladen</button>
      </div>
      <div id="uploadProgress" style="margin-top:10px;"></div>
    </div>

    <div class="card">
      <h3>Events &amp; Videos</h3>
      <div id="eventsList"><p class="muted">–</p></div>
    </div>

    <div class="card">
      <h3>Verbundene Geräte</h3>
      <table><thead><tr><th>Hostname</th><th>IP</th><th>MAC</th></tr></thead>
        <tbody id="clientsBody"><tr><td colspan="3" class="muted">–</td></tr></tbody>
      </table>
    </div>
  </section>
</main>

<script>
const fmtBytes = b => {
  if (!b && b !== 0) return "–";
  const u = ["B","KB","MB","GB","TB"]; let i=0;
  while (b >= 1024 && i < u.length-1) { b/=1024; i++; }
  return b.toFixed(b<10?2:b<100?1:0) + " " + u[i];
};

let currentEvents = [];

async function loadStatus() {
  let r;
  try { r = await fetch("/api/admin/status", {credentials:"same-origin"}); }
  catch (e) { showLogin("Admin-Service nicht erreichbar: " + e.message); return; }
  if (r.status === 401) { showLogin(); return; }
  if (!r.ok) { showLogin("Admin-API Fehler: HTTP " + r.status); return; }
  let s;
  try { s = await r.json(); }
  catch (e) { showLogin("Ungültige API-Antwort"); return; }
  showDash();
  document.getElementById("ts").textContent = new Date(s.timestamp*1000).toLocaleTimeString();
  document.getElementById("videoCount").textContent = s.video_count;
  document.getElementById("eventCount").textContent = s.events.length;
  document.getElementById("clientCount").textContent = s.clients.length;

  const d = s.disk, pct = d.total ? (d.used/d.total*100) : 0;
  document.getElementById("diskFree").textContent = fmtBytes(d.free) + " frei";
  document.getElementById("diskBar").style.width = pct.toFixed(1) + "%";
  document.getElementById("diskDetail").textContent =
    `${fmtBytes(d.used)} von ${fmtBytes(d.total)} belegt · ${d.path}`;

  currentEvents = s.events;
  renderEvents(s.events);
  renderEventSelect(s.events);

  document.getElementById("clientsBody").innerHTML = s.clients.length
    ? s.clients.map(c => `<tr><td>${c.hostname || "–"}</td><td>${c.ip || "–"}</td><td>${c.mac}</td></tr>`).join("")
    : `<tr><td colspan="3" class="muted">Keine Geräte verbunden</td></tr>`;

  renderLock(s.lock);
}

function renderEvents(events) {
  const box = document.getElementById("eventsList");
  if (!events.length) { box.innerHTML = '<p class="muted">Noch keine Events. Lege oben eines an.</p>'; return; }
  box.innerHTML = events.map(e => `
    <div class="event-block">
      <div class="row">
        <h4>${e.name} <span class="muted">· ${e.count} Video${e.count===1?"":"s"} · ${fmtBytes(e.bytes)}</span></h4>
        <button class="danger" data-del-event="${encodeURIComponent(e.name)}">Event löschen</button>
      </div>
      ${e.videos.length ? `<table><thead><tr><th>Datei</th><th>Größe</th><th></th></tr></thead><tbody>
        ${e.videos.map(v => `<tr>
          <td><a href="${v.play}" target="_blank" style="color:#58a6ff">${v.name}</a></td>
          <td>${fmtBytes(v.size)}</td>
          <td style="text-align:right"><button class="danger" data-del-file="${encodeURIComponent(e.name)}/${encodeURIComponent(v.name)}">Löschen</button></td>
        </tr>`).join("")}
      </tbody></table>` : '<p class="muted">Keine Videos.</p>'}
    </div>`).join("");

  box.querySelectorAll("[data-del-file]").forEach(b => b.addEventListener("click", async () => {
    if (!confirm("Video wirklich löschen?")) return;
    const r = await fetch("/api/admin/file/" + b.dataset.delFile, {method:"DELETE", credentials:"same-origin"});
    if (!r.ok) alert("Fehler: " + r.status);
    loadStatus();
  }));
  box.querySelectorAll("[data-del-event]").forEach(b => b.addEventListener("click", async () => {
    if (!confirm("Event komplett löschen (inkl. aller Videos)?")) return;
    const r = await fetch("/api/admin/event/" + b.dataset.delEvent, {method:"DELETE", credentials:"same-origin"});
    if (!r.ok) alert("Fehler: " + r.status);
    loadStatus();
  }));
}

function renderEventSelect(events) {
  const sel = document.getElementById("uploadEvent");
  const prev = sel.value;
  sel.innerHTML = events.length
    ? events.map(e => `<option value="${e.name}">${e.name}</option>`).join("")
    : '<option value="">(erst Event anlegen)</option>';
  if (prev && events.some(e=>e.name===prev)) sel.value = prev;
}

function renderLock(l) {
  if (!l) return;
  const icon = document.getElementById("lockIcon");
  const state = document.getElementById("lockState");
  const detail = document.getElementById("lockDetail");
  if (l.locked === true) { icon.textContent="🔒"; state.textContent="Gesperrt"; state.style.color="#2ea043"; }
  else if (l.locked === false) { icon.textContent="🔓"; state.textContent="Offen"; state.style.color="#f0883e"; }
  else { icon.textContent="ℹ️"; state.textContent="–"; state.style.color="#8b949e"; }
  detail.textContent = `${l.detail || ""} · FS: ${l.fs || "?"}`;
}

async function doLock(action) {
  const msg = document.getElementById("lockMsg");
  msg.textContent = action === "lock" ? "Sperre Videos…" : "Gebe Videos frei…";
  const r = await fetch(`/api/admin/${action}`, {method:"POST", credentials:"same-origin"});
  const j = await r.json().catch(()=>({}));
  msg.textContent = r.ok ? "Fertig." : ("Fehler: " + (j.error || j.stderr || r.status));
  if (j.lock) renderLock(j.lock);
  setTimeout(loadStatus, 500);
}
document.getElementById("btnLock").addEventListener("click", () => doLock("lock"));
document.getElementById("btnUnlock").addEventListener("click", () => doLock("unlock"));

document.getElementById("newEventForm").addEventListener("submit", async e => {
  e.preventDefault();
  const name = document.getElementById("newEventName").value.trim();
  const msg = document.getElementById("newEventMsg");
  if (!name) return;
  const r = await fetch("/api/admin/event/" + encodeURIComponent(name),
    {method:"POST", credentials:"same-origin"});
  const j = await r.json().catch(()=>({}));
  msg.textContent = r.ok ? `Event „${j.name}" angelegt.` : ("Fehler: " + (j.error || r.status));
  msg.style.color = r.ok ? "#2ea043" : "#f85149";
  if (r.ok) document.getElementById("newEventName").value = "";
  loadStatus();
});

function uploadOne(ev, file) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    const wrap = document.createElement("div");
    wrap.style.margin = "6px 0";
    wrap.innerHTML = `<div class="muted">${ev} / ${file.name} <span class="p">0%</span></div><progress max="100" value="0"></progress>`;
    document.getElementById("uploadProgress").appendChild(wrap);
    const pText = wrap.querySelector(".p");
    const pBar = wrap.querySelector("progress");
    xhr.upload.onprogress = e => {
      if (e.lengthComputable) {
        const pct = (e.loaded/e.total*100).toFixed(0);
        pBar.value = pct; pText.textContent = pct + "%";
      }
    };
    xhr.onload = () => {
      if (xhr.status >= 200 && xhr.status < 300) { pText.textContent = "fertig"; resolve(); }
      else { pText.textContent = "Fehler " + xhr.status; reject(new Error(xhr.responseText)); }
    };
    xhr.onerror = () => { pText.textContent = "Netzwerkfehler"; reject(new Error("network")); };
    xhr.open("PUT", `/api/admin/upload/${encodeURIComponent(ev)}/${encodeURIComponent(file.name)}`);
    xhr.withCredentials = true;
    xhr.setRequestHeader("Content-Type", "video/mp4");
    xhr.send(file);
  });
}

document.getElementById("btnUpload").addEventListener("click", async () => {
  const ev = document.getElementById("uploadEvent").value;
  const files = [...document.getElementById("uploadFiles").files];
  if (!ev) { alert("Bitte zuerst Event anlegen."); return; }
  if (!files.length) { alert("Keine Datei gewählt."); return; }
  const btn = document.getElementById("btnUpload");
  btn.disabled = true;
  try {
    for (const f of files) {
      if (!f.name.toLowerCase().endsWith(".mp4")) {
        alert(`Übersprungen (kein .mp4): ${f.name}`); continue;
      }
      await uploadOne(ev, f);
    }
    document.getElementById("uploadFiles").value = "";
    loadStatus();
  } catch (e) {
    alert("Upload-Fehler: " + e.message);
  } finally {
    btn.disabled = false;
  }
});

function showLogin(err){
  document.getElementById("login").hidden=false;
  document.getElementById("dashboard").hidden=true;
  document.getElementById("loginErr").textContent = err || "";
}
function showDash(){ document.getElementById("login").hidden=true; document.getElementById("dashboard").hidden=false; }

document.getElementById("loginForm").addEventListener("submit", async e => {
  e.preventDefault();
  const pin = document.getElementById("pin").value;
  const r = await fetch("/api/admin/login", {
    method:"POST", credentials:"same-origin",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({pin})
  });
  if (r.ok) { document.getElementById("loginErr").textContent=""; loadStatus(); startPolling(); }
  else       { document.getElementById("loginErr").textContent="Falscher PIN"; }
});

document.getElementById("logout").addEventListener("click", async () => {
  await fetch("/api/admin/logout", {method:"POST", credentials:"same-origin"});
  showLogin();
});

let timer=null;
function startPolling(){ if(timer) clearInterval(timer); timer=setInterval(loadStatus, 10000); }

loadStatus().then(startPolling);
</script>
</body>
</html>
