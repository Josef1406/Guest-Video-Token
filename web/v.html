<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Dein Video</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <main class="wrap">
    <h1>Dein Video</h1>
    <p id="meta" class="muted"></p>

    <video id="player" controls playsinline preload="metadata"></video>

    <div class="actions">
      <a id="dl" class="btn primary" download>Download</a>
      <a id="wa" class="btn" target="_blank" rel="noopener">Per WhatsApp teilen</a>
    </div>

    <p class="muted small">
      Tipp: Halte das Video im Player gedrückt (iOS: "In Fotos sichern"), um es lokal zu speichern.
    </p>
  </main>
  <script src="/assets/player.js"></script>
</body>
</html>
