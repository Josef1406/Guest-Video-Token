<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <title>Video_GB – Verbindung</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }
    .card {
      max-width: 24rem;
      width: 100%;
      background: #1e293b;
      border-radius: 1rem;
      padding: 1.75rem;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 .35rem; font-size: 1.4rem; }
    p  { margin: .35rem 0 1rem; color: #cbd5e1; }
    .ssid { display: inline-block; padding: .15rem .55rem; border-radius: .4rem;
            background: #334155; color: #fef08a; font-weight: 600; }
    button {
      -webkit-appearance: none; appearance: none;
      width: 100%;
      padding: .95rem 1rem;
      margin-top: 1rem;
      border: 0;
      border-radius: .75rem;
      background: #22c55e;
      color: #052e16;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
    }
    button:active { transform: translateY(1px); }
    .hint { font-size: .85rem; color: #94a3b8; margin-top: 1rem; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Willkommen beim Video-Gästebuch</h1>
    <p>Du bist mit dem WLAN <span class="ssid">Video_GB</span> verbunden.</p>
    <p>Bitte bestätige die Verbindung, damit dein Gerät im Netzwerk bleibt.</p>
    <form method="get" action="/accept">
      <button type="submit">Verbindung annehmen</button>
    </form>
    <p class="hint">Danach kannst du den QR-Code auf deinem Ausdruck scannen, um dein Video zu öffnen.</p>
  </main>
</body>
</html>
